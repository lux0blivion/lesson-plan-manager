version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planeduca-backend
    env_file:
      - ./backend/.env
    volumes:
      - db_data:/app/instance
    networks:
      - planeduca-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planeduca-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - planeduca-net
    restart: unless-stopped

volumes:
  db_data:

networks:
  planeduca-net:
    driver: bridge
